---
name: "Build Containers"

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

# NOTE (reaatech fork): repointed from gitroomhq -> reaatech, added packages:write,
# and simplified to a single amd64 build (the target host is amd64-only) that pushes
# both :<tag> and :latest directly. The previous multi-arch matrix + manifest job is
# removed because the org has no arm64 runner and only amd64 is deployed.
jobs:
  build-containers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image (amd64)
        env:
          CONTAINERVER: ${{ github.ref_name }}
          NEXT_PUBLIC_VERSION: ${{ github.ref_name }}
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile.dev \
            -t ghcr.io/reaatech/postmill-app:${CONTAINERVER} \
            -t ghcr.io/reaatech/postmill-app:latest \
            --build-arg NEXT_PUBLIC_VERSION=${NEXT_PUBLIC_VERSION} \
            --pull \
            --no-cache \
            --provenance=false --sbom=false \
            --push .

      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect ghcr.io/reaatech/postmill-app:${{ github.ref_name }}
