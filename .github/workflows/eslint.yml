---
name: ESLint

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - pnpm-lock.yaml
      - eslint.config.mjs
      - apps/**
      - '!apps/docs/**'
      - libraries/**
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - eslint.config.mjs
      - apps/**
      - '!apps/docs/**'
      - libraries/**

jobs:
  eslint:
    name: Run eslint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      matrix:
        node-version: ['22.12.0']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          run_install: false

      - name: Install native dependencies for node-canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev build-essential g++ libpixman-1-dev

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm exec eslint . --config eslint.config.mjs --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif

      # The Microsoft SARIF formatter also emits ESLint's directive-suppressed messages
      # (results with `suppressions: [{state: "accepted"}]`, no `kind` property). GitHub
      # code scanning does not honor that shape and surfaces them as OPEN alerts — an
      # inline `eslint-disable` then still fails the PR's code-scanning check. Suppressed
      # findings are not problems; drop them before upload.
      - name: Strip directive-suppressed results from SARIF
        run: |
          jq '.runs[].results |= map(select((.suppressions // []) | length == 0))' \
            eslint-results.sarif > eslint-results.filtered.sarif
          mv eslint-results.filtered.sarif eslint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
