---
name: Test

on:
  push:
  merge_group:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postmill-local
          POSTGRES_PASSWORD: postmill-local-pwd
          POSTGRES_DB: postmill-db-local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postmill-local"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: ['22.12.0']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Run tests (Vitest)
        run: pnpm run test

      - name: Coverage gates (Vitest --coverage)
        run: pnpm run test:coverage

      - name: Run integration tests (Vitest + Postgres)
        env:
          TEST_DATABASE_ADMIN_URL: postgresql://postmill-local:postmill-local-pwd@localhost:5432/postgres
          DATABASE_URL: postgresql://postmill-local:postmill-local-pwd@localhost:5432/postmill-db-local
        run: pnpm run test:int

      - name: Schema drift check
        env:
          DATABASE_URL: postgresql://postmill-local:postmill-local-pwd@localhost:5432/postmill-db-local
        run: |
          # mastra_* noise approach: this DB has ONLY had `db push` applied (the app never
          # boots in CI), so the runtime-created mastra_* tables — which live outside the
          # Prisma schema — are absent and cannot show up as drift.
          pnpm exec prisma db push --skip-generate \
            --schema libraries/nestjs-libraries/src/database/prisma/schema.prisma
          # `migrate diff --exit-code` returns 2 when the schema and DB diverge, 0 when in
          # sync. Any non-zero exit fails the job (CI run uses bash -e).
          pnpm exec prisma migrate diff \
            --from-schema-datamodel libraries/nestjs-libraries/src/database/prisma/schema.prisma \
            --to-url "$DATABASE_URL" \
            --exit-code

      - name: Destructive schema guard (vs origin/main)
        run: |
          # Ensure origin/main is available even on shallow forks.
          git fetch --no-tags --depth=1 origin main || true
          # Extract main's schema (the baseline) into a temp file; on the very first
          # commit to main (no origin/main yet) there is nothing to diff against.
          if git show origin/main:libraries/nestjs-libraries/src/database/prisma/schema.prisma \
              > /tmp/main-schema.prisma 2>/dev/null; then
            pnpm exec prisma migrate diff \
              --from-schema-datamodel /tmp/main-schema.prisma \
              --to-schema-datamodel libraries/nestjs-libraries/src/database/prisma/schema.prisma \
              --script > /tmp/pending.sql
            node scripts/schema-destructive-guard.mjs --file /tmp/pending.sql
          else
            echo "origin/main schema not found — skipping destructive guard (first push to main)."
          fi
