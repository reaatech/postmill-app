packages:
  - apps/*
  - libraries/*

overrides:
  next: 16.2.7
  react: 19.2.7
  react-dom: 19.2.7
  '@types/react': 19.1.8
  '@types/react-dom': 19.1.6
  # Security overrides — see dev/PACKAGE_UPGRADE.md §4. Both parents are at their
  # latest and pin the vulnerable version *exactly*, so there is no upgrade-the-parent
  # path; these patched ranges are the only way to close the high advisories.
  # protobufjs <=7.5.5: 4 high GHSAs, pinned exactly by @temporalio/proto@1.17.2.
  #   Constrained to the 7.x patch line so Temporal's generated code stays API-compatible.
  protobufjs: '>=7.5.6 <8'
  # rollup <2.80.0: high path-traversal, pinned exactly by @crxjs/vite-plugin@2.4.0.
  rollup: '>=2.80.0'
  # form-data <2.5.4: critical unsafe-random boundary (GHSA-fjxv-7rqg-78g4), pulled by
  # node-telegram-bot-api@0.66.0 -> @cypress/request-promise -> request@2.88.2 (pins
  # form-data ~2.3.2). request has no non-`request` successor, so bump the vulnerable 2.3.x
  # to patched 2.5.x (same major, API-compatible) only where <2.5.4 is requested.
  'form-data@<2.5.4': '>=2.5.4 <3'

onlyBuiltDependencies:
  - bcrypt
  - '@sentry-internal/node-cpu-profiler'

allowBuilds:
  '@nestjs/core': set this to true or false
  '@parcel/watcher': set this to true or false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': set this to true or false
  '@sentry-internal/node-cpu-profiler': set this to true or false
  '@sentry/cli': set this to true or false
  '@swc/core': set this to true or false
  bcrypt: set this to true or false
  bufferutil: set this to true or false
  canvas: set this to true or false
  core-js: set this to true or false
  core-js-pure: set this to true or false
  esbuild: set this to true or false
  prisma: true
  protobufjs: set this to true or false
  sharp: true
  unrs-resolver: set this to true or false
  utf-8-validate: set this to true or false
