# Do **not** use this yml for production. It is not up-to-date.
# Use https://docs.postmill.com/installation/docker-compose
# This is only for the dev enviroment

services:
  postmill-postgres:
    # ref: https://hub.docker.com/_/postgres
    image: postgres:17-alpine # 17.0
    container_name: postmill-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postmill-local-pwd
      POSTGRES_USER: postmill-local
      POSTGRES_DB: postmill-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - postmill-network
  postmill-redis:
    # ref: https://hub.docker.com/_/redis
    image: redis:7-alpine # 7.4.0
    container_name: postmill-redis
    restart: always
    ports:
      - 6379:6379
    networks:
      - postmill-network
  postmill-pg-admin:
    # ref: https://hub.docker.com/r/dpage/pgadmin4/tags
    image: dpage/pgadmin4:latest
    container_name: postmill-pg-admin
    restart: always
    ports:
      - 8081:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - postmill-network
  postmill-redisinsight:
    # ref: https://hub.docker.com/r/redis/redisinsight
    image: redis/redisinsight:latest
    container_name: postmill-redisinsight
    links:
      - postmill-redis
    ports:
      - '5540:5540'
    volumes:
      - redisinsight:/data
    networks:
      - postmill-network
    restart: always

volumes:
  redisinsight:
  postgres-volume:
    external: false

networks:
  postmill-network:
    external: false
