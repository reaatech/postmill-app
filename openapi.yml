        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: unknownOnly, in: query, schema: { type: string } }
      responses: { '200': { description: Stats } }

  # ===================================================================== COPILOT
  /copilot/chat:
    post:
      tags: [Copilot]
      summary: CopilotKit chat runtime (GraphQL-over-HTTP)
      operationId: copilotChat
      description: |
        Proxies the CopilotKit Node HTTP runtime. Body/response follow the CopilotKit GQL protocol.
        Short-circuits with `500` if no AI provider (admin config or `OPENAI_API_KEY`) is available.
      requestBody:
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses:
        '200': { description: CopilotKit runtime response }
        '422': { description: AI provider not configured }

  /copilot/agent:
    post:
      tags: [Copilot]
      summary: Mastra agent runtime (CopilotKit)
      operationId: copilotAgent
      requestBody:
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses:
        '200': { description: Agent runtime response }
        '422': { description: AI provider not configured }

  /copilot/credits:
    get:
      tags: [Copilot]
      summary: Remaining AI credits
      operationId: copilotCredits
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [ai_images, ai_videos], default: ai_images } }
      responses: { '200': { description: Credits } }

  /copilot/list:
    get:
      tags: [Copilot]
      summary: List chat threads
      operationId: copilotList
      parameters: [{ name: perPage, in: query, schema: { type: integer, default: 50 } }]
      responses:
        '200':
          description: Threads
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads:
                    type: array
                    items:
                      type: object
                      properties: { id: { type: string }, title: { type: string } }

  /copilot/{thread}/list:
    get:
      tags: [Copilot]
      summary: List messages in a thread
      operationId: copilotThreadList
      parameters: [{ name: thread, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: Messages } }

  # ===================================================================== ENTERPRISE (signed webhooks)
  /enterprise/create-user:
    post:
      tags: [Enterprise]
      summary: Provision an enterprise user (signed JWT params)
      operationId: enterpriseCreateUser
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SignedParams' } } }
      responses: { '200': { description: Result } }

  /enterprise/url:
    post:
      tags: [Enterprise]
      summary: Get a social-connect URL (signed JWT params)
      operationId: enterpriseUrl
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SignedParams' } } }
      responses: { '200': { description: Auth URL (string) } }

  /enterprise/delete-channel:
    post:
      tags: [Enterprise]
      summary: Delete a channel (signed JWT params)
      operationId: enterpriseDeleteChannel
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SignedParams' } } }
      responses: { '200': { description: Result, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessFlag' } } } } }

  # ===================================================================== STRIPE WEBHOOK
  /stripe:
    post:
      tags: [Stripe]
      summary: Stripe webhook receiver
      operationId: stripeWebhook
      security: []
      description: Validates the `stripe-signature` header against `STRIPE_SIGNING_KEY`.
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses:
        '200': { description: Acknowledged, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        '500': { $ref: '#/components/responses/ServerError' }

  # ===================================================================== PUBLIC (unauthenticated)
  /public/agent:
    post:
      tags: [Public]
      summary: Insert a post via the agent API key
      operationId: publicAgent
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { text: { type: string }, apiKey: { type: string } } }
      responses: { '200': { description: Created (or empty if key invalid) } }

  /public/posts/{id}:
    get:
      tags: [Public]
      summary: Public preview of a post thread
      operationId: publicPostPreview
      security: []
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Post thread (sanitized integration info), content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } }

  /public/posts/{id}/comments:
    get:
      tags: [Public]
      summary: Public comments of a post
      operationId: publicPostComments
      security: []
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Comments, content: { application/json: { schema: { type: object, properties: { comments: { type: array, items: { type: object, additionalProperties: true } } } } } } } }

  /public/t:
    post:
      tags: [Public]
      summary: Track an event (anonymous)
      operationId: publicTrack
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/TrackEventBody' } } }
      responses: { '200': { description: Tracking id } }

  /public/modify-subscription:
    post:
      tags: [Public]
      summary: Modify a subscription via a signed token
      operationId: publicModifySubscription
      security: []
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { params: { type: string, description: Signed JWT } } } } }
      responses: { '200': { description: Result, content: { application/json: { schema: { $ref: '#/components/schemas/SuccessFlag' } } } } }

  /public/stream:
    get:
      tags: [Public]
      summary: Proxy-stream an mp4 (SSRF-guarded, range-aware)
      operationId: publicStream
      security: []
      parameters: [{ name: url, in: query, required: true, schema: { type: string, format: uri } }]
      responses:
        '200': { description: Streamed video, content: { video/mp4: { schema: { type: string, format: binary } } } }
        '206': { description: Partial content (range) }
        '400': { description: Invalid or blocked URL }

  # ===================================================================== PUBLIC API (/public/v1) — apiKey
  /public/v1/upload:
    post:
      tags: [Public API]
      summary: Upload a media file
      operationId: publicApiUpload
      security: [{ apiKey: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties: { file: { type: string, format: binary } }
      responses:
        '200': { description: Saved media, content: { application/json: { schema: { $ref: '#/components/schemas/Media' } } } }
        '400': { description: No file / unsupported type }
        '401': { $ref: '#/components/responses/PublicUnauthorized' }

  /public/v1/upload-from-url:
    post:
      tags: [Public API]
      summary: Upload media from a public URL (SSRF-guarded)
      operationId: publicApiUploadFromUrl
      security: [{ apiKey: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UploadDto' } } }
      responses:
        '200': { description: Saved media, content: { application/json: { schema: { $ref: '#/components/schemas/Media' } } } }
        '400': { description: Failed to fetch / unsupported type }

  /public/v1/find-slot/{id}:
    get:
      tags: [Public API]
      summary: Find next free slot for a channel
      operationId: publicApiFindSlot
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Next free datetime, content: { application/json: { schema: { type: object, properties: { date: { type: string, format: date-time } } } } } } }

  /public/v1/posts:
    get:
      tags: [Public API]
      summary: List posts in a date range
      operationId: publicApiGetPosts
      security: [{ apiKey: [] }]
      parameters:
        - { name: startDate, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: endDate, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: customer, in: query, schema: { type: string } }
      responses: { '200': { description: Posts, content: { application/json: { schema: { type: object, properties: { posts: { type: array, items: { type: object, additionalProperties: true } } } } } } } }
    post:
      tags: [Public API]
      summary: Create a post
      operationId: publicApiCreatePost
      security: [{ apiKey: [] }]
      description: |
        Same validation as the dashboard. Supports `creationMethod` `CLI`|`API` (defaults to `API`).
        If `RESTRICT_UPLOAD_DOMAINS` is set, all media must be hosted on that domain.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreatePostDto' } } }
      responses:
        '200': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/CreatePostResult' } } } }
        '400': { $ref: '#/components/responses/PostValidation' }

  /public/v1/posts/{id}:
    delete:
      tags: [Public API]
      summary: Delete a post by id (deletes its group)
      operationId: publicApiDeletePost
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Deleted } }

  /public/v1/posts/group/{group}:
    delete:
      tags: [Public API]
      summary: Delete a post group
      operationId: publicApiDeletePostGroup
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathGroup' }]
      responses: { '200': { description: Deleted } }

  /public/v1/posts/{id}/missing:
    get:
      tags: [Public API]
      summary: Get missing content for a post
      operationId: publicApiMissing
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Missing content } }

  /public/v1/posts/{id}/status:
    put:
      tags: [Public API]
      summary: Change a post's status
      operationId: publicApiChangeStatus
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ChangePostStatusDto' } } }
      responses: { '200': { description: Updated } }

  /public/v1/posts/{id}/release-id:
    put:
      tags: [Public API]
      summary: Set the external release id of a post
      operationId: publicApiReleaseId
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { releaseId: { type: string } } } } }
      responses: { '200': { description: Updated } }

  /public/v1/is-connected:
    get:
      tags: [Public API]
      summary: API-key connectivity check
      operationId: publicApiIsConnected
      security: [{ apiKey: [] }]
      responses: { '200': { description: Connected, content: { application/json: { schema: { type: object, properties: { connected: { type: boolean } } } } } } }

  /public/v1/groups:
    get:
      tags: [Public API]
      summary: List customer groups
      operationId: publicApiGroups
      security: [{ apiKey: [] }]
      responses:
        '200':
          description: Groups
          content:
            application/json:
              schema: { type: array, items: { type: object, properties: { id: { type: string }, name: { type: string } } } }

  /public/v1/integrations:
    get:
      tags: [Public API]
      summary: List connected channels
      operationId: publicApiIntegrations
      security: [{ apiKey: [] }]
      parameters: [{ name: group, in: query, schema: { type: string } }]
      responses:
        '200':
          description: Channels
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/PublicIntegration' } }

  /public/v1/integrations/{id}:
    delete:
      tags: [Public API]
      summary: Delete a channel
      operationId: publicApiDeleteChannel
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Deleted } }

  /public/v1/integration-settings/{id}:
    get:
      tags: [Public API]
      summary: Get a channel's posting rules, max length, settings & tools
      operationId: publicApiIntegrationSettings
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses:
        '200': { description: Settings, content: { application/json: { schema: { type: object, properties: { output: { type: object, additionalProperties: true } } } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /public/v1/integration-trigger/{id}:
    post:
      tags: [Public API]
      summary: Invoke a channel provider tool/method
      operationId: publicApiIntegrationTrigger
      security: [{ apiKey: [] }]
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [methodName]
              properties:
                methodName: { type: string }
                data: { type: object, additionalProperties: { type: string } }
      responses:
        '200': { description: Tool output, content: { application/json: { schema: { type: object, properties: { output: {} } } } } }
        '401': { description: Channel disconnected (expired token) }
        '404': { description: Integration / tool not found }

  /public/v1/social/{integration}:
    get:
      tags: [Public API]
      summary: Begin connecting a channel (get auth URL)
      operationId: publicApiSocial
      security: [{ apiKey: [] }]
      parameters:
        - { name: integration, in: path, required: true, schema: { type: string } }
        - { name: refresh, in: query, schema: { type: string } }
      responses:
        '200': { description: Auth URL, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } }
        '400': { description: Integration not allowed / requires external URL }

  /public/v1/notifications:
    get:
      tags: [Public API]
      summary: List notifications (paginated)
      operationId: publicApiNotifications
      security: [{ apiKey: [] }]
      parameters: [{ name: page, in: query, schema: { type: integer, default: 0 } }]
      responses: { '200': { description: Notifications } }

  /public/v1/generate-video:
    post:
      tags: [Public API]
      summary: Generate a video
      operationId: publicApiGenerateVideo
      security: [{ apiKey: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VideoDto' } } }
      responses: { '200': { description: Result } }

  /public/v1/video/function:
    post:
      tags: [Public API]
      summary: Invoke a video-generator function
      operationId: publicApiVideoFunction
      security: [{ apiKey: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/VideoFunctionDto' } } }
      responses: { '200': { description: Result } }

  /public/v1/analytics/{integration}:
    get:
      tags: [Public API]
      summary: Legacy single-channel analytics (n8n/Zapier compatible)
      operationId: publicApiAnalytics
      security: [{ apiKey: [] }]
      description: '**Legacy** route — response shape is intentionally frozen for compatibility.'
      parameters:
        - { name: integration, in: path, required: true, schema: { type: string } }
        - { name: date, in: query, schema: { type: string } }
      responses: { '200': { description: Analytics } }

  /public/v1/analytics/post/{postId}:
    get:
      tags: [Public API]
      summary: Legacy single-post analytics
      operationId: publicApiPostAnalytics
      security: [{ apiKey: [] }]
      parameters:
        - { name: postId, in: path, required: true, schema: { type: string } }
        - { name: date, in: query, schema: { type: string, description: Numeric (days) } }
      responses: { '200': { description: Post analytics } }

  /public/v1/analytics/overview:
    get:
      tags: [Public API]
      summary: Analytics v2 overview (public)
      operationId: publicApiAnalyticsOverview
      security: [{ apiKey: [] }]
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
        - { $ref: '#/components/parameters/IntegrationsCsv' }
        - { $ref: '#/components/parameters/Compare' }
      responses: { '200': { description: Overview } }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth
      description: Session JWT in the `auth` cookie (dashboard API).
    authHeader:
      type: apiKey
      in: header
      name: auth
      description: Session JWT in the `auth` header (alternative to the cookie).
    apiKey:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Organization **API key** or a `pos_`-prefixed OAuth access token, sent **raw** (no `Bearer`
        prefix) in the `Authorization` header. Used by `/public/v1/*`.

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string }
    PathUuid:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PathGroup:
      name: group
      in: path
      required: true
      schema: { type: string }
    PathCommentId:
      name: commentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    PathIdentifier:
      name: identifier
      in: path
      required: true
      schema: { type: string }
    PathProvider:
      name: provider
      in: path
      required: true
      schema: { type: string }
    AuthProvider:
      name: provider
      in: path
      required: true
      schema: { type: string, enum: [LOCAL, GITHUB, GOOGLE, FARCASTER, WALLET, GENERIC] }
    QueueName:
      name: name
      in: path
      required: true
      schema: { type: string }
    From:
      name: from
      in: query
      required: true
      schema: { type: string, format: date }
      description: Range start (inclusive). ISO date.
    To:
      name: to
      in: query
      required: true
      schema: { type: string, format: date }
      description: Range end (inclusive). ISO date.
    IntegrationsCsv:
      name: integrations
      in: query
      required: false
      schema: { type: string }
      description: Comma-separated channel ids to filter by.
    Compare:
      name: compare
      in: query
      required: false
      schema: { type: string, enum: ['true', 'false'] }
      description: When `true`, include comparison against the previous period.

  headers:
    SetAuthCookie:
      description: Sets the `auth` session cookie (and possibly `showorg`).
      schema: { type: string }

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized400:
      description: Not authorized (super-admin only) — returned as HTTP 400 by these routes
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Forbidden (insufficient permissions / not a super-admin)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Too many requests (throttled)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    SubscriptionRequired:
      description: An active subscription is required for this action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    PublicUnauthorized:
      description: Missing/invalid API key or no subscription
      content:
        application/json:
          schema:
            type: object
            properties: { msg: { type: string, example: Invalid API key } }
    PostValidation:
      description: Per-channel post validation failure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/PostValidationError' }

  schemas:
    # ---------- Common ----------
    Error:
      type: object
      properties:
        statusCode: { type: integer, example: 400 }
        message:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
          example: Bad Request
        error: { type: string, example: Bad Request }
    SuccessFlag:
      type: object
      properties:
        success: { type: boolean, example: true }
    PostValidationError:
      type: object
      description: Structured per-channel validation failure (PostValidationExceptionFilter).
      properties:
        provider: { type: string, example: twitter }
        name: { type: string, example: My Twitter }
        error: { type: string, example: post is too long, please fix it }

    # ---------- Auth DTOs ----------
    CreateOrgUserDto:
      type: object
      required: [provider, company]
      properties:
        email: { type: string, format: email, description: Required unless using a provider token }
        password: { type: string, minLength: 3, maxLength: 64, description: Required unless using a provider token }
        provider: { type: string, enum: [LOCAL, GITHUB, GOOGLE, FARCASTER, WALLET, GENERIC] }
        providerToken: { type: string, description: Required unless using email+password }
        company: { type: string, minLength: 3, maxLength: 128 }
        datafast_visitor_id: { type: string }
      example:
        email: jane@example.com
        password: s3cretpw
        provider: LOCAL
        company: Acme Inc
    LoginUserDto:
      type: object
      required: [provider, email]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 3 }
        provider: { type: string, enum: [LOCAL, GITHUB, GOOGLE, FARCASTER, WALLET, GENERIC] }
        providerToken: { type: string }
        datafast_visitor_id: { type: string }
      example: { email: jane@example.com, password: s3cretpw, provider: LOCAL }
    ForgotPasswordDto:
      type: object
      required: [email]
      properties: { email: { type: string, format: email } }
    ForgotReturnPasswordDto:
      type: object
      required: [password, repeatPassword, token]
      properties:
        password: { type: string, minLength: 3 }
        repeatPassword: { type: string }
        token: { type: string, minLength: 5 }
    ResendActivationDto:
      type: object
      required: [email]
      properties: { email: { type: string, format: email } }

    # ---------- User ----------
    SelfUser:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        orgId: { type: string }
        totalChannels: { type: integer }
        tier: { type: string, example: FREE }
        role: { type: string, example: SUPERADMIN }
        isLifetime: { type: boolean }
        admin: { type: boolean }
        impersonate: { type: boolean }
        isTrailing: { type: boolean }
        allowTrial: { type: boolean }
        streakSince: { type: [string, 'null'], format: date-time }
        publicApi: { type: string, description: Org API key (only for ADMIN/SUPERADMIN) }
      additionalProperties: true
    UserDetailDto:
      type: object
      required: [fullname]
      properties:
        fullname: { type: string, minLength: 3 }
        bio: { type: string }
        picture: { $ref: '#/components/schemas/MediaRef' }
    EmailNotificationsDto:
      type: object
      required: [sendSuccessEmails, sendFailureEmails, sendStreakEmails]
      properties:
        sendSuccessEmails: { type: boolean }
        sendFailureEmails: { type: boolean }
        sendStreakEmails: { type: boolean }
    TrackEventBody:
      type: object
      properties:
        tt: { type: string, description: Track enum value }
        fbclid: { type: string }
        additional: { type: object, additionalProperties: true }
    Organization:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        name: { type: string }
        apiKey: { type: string }
    Subscription:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        subscriptionTier: { type: string, example: PRO }
        totalChannels: { type: integer }
        isLifetime: { type: boolean }
        period: { type: string, enum: [MONTHLY, YEARLY] }

    # ---------- Posts ----------
    MediaRef:
      type: object
      properties:
        id: { type: string }
        path: { type: string }
      additionalProperties: true
    PostContent:
      type: object
      required: [content, image]
      properties:
        content: { type: string, description: Sanitized post content }
        id: { type: string }
        delay: { type: integer, description: Delay (ms) for thread items }
        image:
          type: array
          items: { $ref: '#/components/schemas/MediaRef' }
    Post:
      type: object
      required: [integration, value]
      properties:
        type: { type: string }
        integration:
          type: object
          required: [id]
          properties: { id: { type: string } }
        value:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/PostContent' }
        group: { type: string }
        settings:
          type: object
          description: Provider-specific settings (discriminated by `__type`).
          additionalProperties: true
    CreatePostDto:
      type: object
      required: [type, shortLink, date, tags, posts]
      properties:
        type: { type: string, enum: [draft, schedule, now, update] }
        order: { type: string }
        shortLink: { type: boolean }
        inter: { type: number }
        date: { type: string, format: date-time }
        tags:
          type: array
          items:
            type: object
            properties: { value: { type: string }, label: { type: string } }
        posts:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Post' }
      example:
        type: schedule
        shortLink: false
        date: '2026-06-10T14:00:00.000Z'
        tags: []
        posts:
          - integration: { id: clt_integration_123 }
            value:
              - content: 'Hello from the Postmill API 👋'
                image: []
            settings: { __type: twitter }
    CreatePostResult:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        group: { type: string }
    PostValidationItem:
      type: object
      additionalProperties: true
      properties:
        identifier: { type: string }
        name: { type: string }
        valid: { type: boolean }
        emptyContent: { type: boolean }
        tooLong: { type: boolean }
        settingsError: { type: string }
        errors:
          oneOf:
            - { type: boolean }
            - { type: string }
    CalendarPost:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        content: { type: string }
        publishDate: { type: string, format: date-time }
        state: { type: string, example: QUEUE }
        integration: { type: object, additionalProperties: true }
    Tag:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        color: { type: string }
    CreateTagDto:
      type: object
      required: [name, color]
      properties:
        name: { type: string }
        color: { type: string, example: '#ff0000' }
    GeneratorDto:
      type: object
      required: [research, isPicture, format, tone]
      properties:
        research: { type: string, minLength: 10 }
        isPicture: { type: boolean }
        format: { type: string, enum: [one_short, one_long, thread_short, thread_long] }
        tone: { type: string, enum: [personal, company] }
    CreateGeneratedPostsDto:
      type: object
      required: [posts, week, year]
      properties:
        posts:
          type: array
          minItems: 1
          items:
            type: object
            required: [list]
            properties:
              list:
                type: array
                minItems: 1
                items:
                  type: object
                  properties: { post: { type: string } }
        week: { type: integer }
        year: { type: integer }
        url: { type: string }
        postId: { type: string }
    ChangePostStatusDto:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [draft, schedule] }

    # ---------- Social comments ----------
    ReplyCommentDto:
      type: object
      required: [message]
      properties:
        message: { type: string, maxLength: 10000 }
    LikeCommentDto:
      type: object
      required: [like]
      properties:
        like: { type: boolean }
    SocialComment:
      type: object
      additionalProperties: true
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        authorName: { type: string }
        status: { type: string, example: open }
        assigneeId: { type: [string, 'null'] }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }
    SocialCommentsPage:
      type: object
      properties:
        comments:
          type: array
          items: { $ref: '#/components/schemas/SocialComment' }
        nextCursor: { type: [string, 'null'] }
      additionalProperties: true

    # ---------- Integrations ----------
    IntegrationListItem:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        internalId: { type: string }
        name: { type: string }
        identifier: { type: string, example: twitter }
        picture: { type: string }
        disabled: { type: boolean }
        editor: { type: string }
        type: { type: string }
        refreshNeeded: { type: boolean }
        customer: { type: [object, 'null'], additionalProperties: true }
        time: { type: array, items: { type: object, additionalProperties: true } }
    PublicIntegration:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        identifier: { type: string }
        picture: { type: string }
        disabled: { type: boolean }
        profile: { type: string }
        customer:
          type: [object, 'null']
          properties: { id: { type: string }, name: { type: string } }
    ConnectIntegrationDto:
      type: object
      required: [state, code, timezone]
      properties:
        state: { type: string }
        code: { type: string }
        timezone: { type: string }
        refresh: { type: string }
    IntegrationTimeDto:
      type: object
      required: [time]
      properties:
        time:
          type: array
          items:
            type: object
            required: [time]
            properties: { time: { type: number, description: Minutes from midnight } }
    IntegrationFunctionDto:
      type: object
      required: [name, id]
      properties:
        name: { type: string, description: Provider method name }
        id: { type: string, description: Integration id }
        data: { description: Arbitrary payload passed to the provider method }
    PlugDto:
      type: object
      required: [func, fields]
      properties:
        func: { type: string }
        fields:
          type: array
          items:
            type: object
            required: [name, value]
            properties: { name: { type: string }, value: { type: string } }

    # ---------- Media ----------
    Media:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        name: { type: string }
        path: { type: string }
        organizationId: { type: string }
        type: { type: string }
        alt: { type: string }
        thumbnail: { type: string }
    SaveMediaInformationDto:
      type: object
      required: [id, alt]
      properties:
        id: { type: string }
        alt: { type: string }
        thumbnail: { type: string, format: uri }
        thumbnailTimestamp: { type: number }
    VideoDto:
      type: object
      required: [type, output]
      properties:
        type: { type: string, description: One of the registered video generator identifiers }
        output: { type: string, enum: [vertical, horizontal] }
        customParams: { description: Generator-specific params }
    VideoFunctionDto:
      type: object
      required: [identifier, functionName]
      properties:
        identifier: { type: string }
        functionName: { type: string }
        params: { description: Function params }
    UploadDto:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri, description: Public HTTPS URL (SSRF-validated) }

    # ---------- AI ----------
    AiProviderSummary:
      type: object
      properties:
        identifier: { type: string, example: openai }
        name: { type: string, example: OpenAI }
        type: { type: string }
        capabilities: { type: object, additionalProperties: true }
        privacy: { type: object, additionalProperties: true }
        enabled: { type: boolean }
        isConfigured: { type: boolean }
        credentialFields:
          type: array
          items: { type: object, additionalProperties: true }
    AiProviderDetail:
      allOf:
        - $ref: '#/components/schemas/AiProviderSummary'
        - type: object
          properties:
            defaultModel: { type: string }
            imageModel: { type: string }
            extraConfig: { type: [object, 'null'], additionalProperties: true }
            models: { type: array, items: { type: object, additionalProperties: true } }
    AiSaveProviderDto:
      type: object
      properties:
        enabled: { type: boolean }
        credentials:
          type: object
          additionalProperties: { type: string }
          example: { apiKey: sk-... }
        defaultModel: { type: string, example: gpt-4o-mini }
        imageModel: { type: string, example: dall-e-3 }
        extraConfig: { type: object, additionalProperties: true }
    AiGovernance:
      type: object
      description: All fields are free-form JSON objects (stored as JSON strings server-side).
      properties:
        guardrailSettings: { type: [object, 'null'], additionalProperties: true }
        budgetSettings:
          type: [object, 'null']
          additionalProperties: true
          properties:
            monthlyCap: { type: [number, 'null'] }
            dailyCap: { type: [number, 'null'] }
        rateLimitSettings: { type: [object, 'null'], additionalProperties: true }
        observability: { type: [object, 'null'], additionalProperties: true }
        mcpSettings: { type: [object, 'null'], additionalProperties: true }
        ragSettings: { type: [object, 'null'], additionalProperties: true }
        scopeModels: { type: [object, 'null'], additionalProperties: true }
        fallbackProvider: { type: [string, 'null'] }
        fallbackImageProvider: { type: [string, 'null'] }
    AiSpendLog:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        organizationId: { type: [string, 'null'] }
        provider: { type: string }
        model: { type: string }
        scope: { type: string, example: utility }
        inputTokens: { type: integer }
        outputTokens: { type: integer }
        costUsd: { type: number }
        createdAt: { type: string, format: date-time }
    BrandProfileDto:
      type: object
      properties:
        instructions: { type: string }
        language: { type: string, example: en }
        enabled: { type: boolean }
    ModerateRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        orgId: { type: string }
        direction: { type: string, enum: [output, input], default: output }
        checkImage: { type: boolean }
        imageUrl: { type: string }
    ModerateResponse:
      type: object
      required: [passed]
      properties:
        passed: { type: boolean }
        warnings: { type: array, items: { type: string } }
        redactedContent: { type: string }

    # ---------- Channel config ----------
    ChannelConfigSummary:
      type: object
      properties:
        identifier: { type: string }
        name: { type: string }
        description: { type: string }
        enabled: { type: boolean }
        isConfigured: { type: boolean }
        setupInstructions: { type: string }
        additionalConfig: { type: string }
        isExternal: { type: boolean }
        isWeb3: { type: boolean }
        isChromeExtension: { type: boolean }
        customFields: { type: boolean }
        scopes: { type: string }
    ChannelConfigSaveDto:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        clientId: { type: string }
        clientSecret: { type: string }
        redirectUri: { type: string }
        scopes: { type: string }
        additionalConfig: { type: string, description: Must be valid JSON }
        setupInstructions: { type: string }

    # ---------- Settings / billing ----------
    AddTeamMemberDto:
      type: object
      required: [role, sendEmail]
      properties:
        email: { type: string, format: email, description: Required when sendEmail is true }
        role: { type: string, enum: [USER, ADMIN] }
        sendEmail: { type: boolean }
    ShortlinkPreferenceDto:
      type: object
      required: [shortlink]
      properties:
        shortlink: { type: string, description: ShortLinkPreference enum value }
    BillingSubscribeDto:
      type: object
      required: [period, billing]
      properties:
        period: { type: string, enum: [MONTHLY, YEARLY] }
        billing: { type: string, enum: [STANDARD, PRO, TEAM, ULTIMATE] }
        utm: { type: string }
        dub: { type: string }
        datafast_session_id: { type: string }
        datafast_visitor_id: { type: string }

    # ---------- Webhooks / autopost ----------
    WebhookIntegrationRef:
      type: object
      required: [id]
      properties: { id: { type: string } }
    WebhooksDto:
      type: object
      required: [name, url, integrations]
      properties:
        id: { type: string }
        name: { type: string }
        url: { type: string, format: uri, description: Public HTTPS URL (SSRF-validated) }
        integrations:
          type: array
          items: { $ref: '#/components/schemas/WebhookIntegrationRef' }
    UpdateWebhookDto:
      allOf:
        - $ref: '#/components/schemas/WebhooksDto'
        - type: object
          required: [id]
    AutopostDto:
      type: object
      required: [title, onSlot, syncLast, url, active, addPicture, generateContent]
      properties:
        title: { type: string }
        content: { type: string }
        lastUrl: { type: string }
        onSlot: { type: boolean }
        syncLast: { type: boolean }
        url: { type: string, format: uri, description: Public HTTPS URL (SSRF-validated) }
        active: { type: boolean }
        addPicture: { type: boolean }
        generateContent: { type: boolean }
        integrations:
          type: array
          items:
            type: object
            required: [id]
            properties: { id: { type: string } }

    # ---------- Sets / signatures ----------
    SetsDto:
      type: object
      required: [name, content]
      properties:
        id: { type: string }
        name: { type: string }
        content: { type: string }
    UpdateSetsDto:
      type: object
      required: [id, name, content]
      properties:
        id: { type: string }
        name: { type: string }
        content: { type: string }
    SignatureDto:
      type: object
      required: [content, autoAdd]
      properties:
        content: { type: string }
        autoAdd: { type: boolean }

    # ---------- Third party ----------
    ImportMediaDto:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [url, name]
            properties:
              url: { type: string, format: uri, description: SSRF-validated }
              name: { type: string }

    # ---------- OAuth ----------
    ApproveOAuthDto:
      type: object
      required: [client_id, action]
      properties:
        client_id: { type: string }
        state: { type: string }
        action: { type: string, enum: [approve, deny] }
    TokenExchangeDto:
      type: object
      required: [grant_type, code, client_id, client_secret]
      properties:
        grant_type: { type: string, enum: [authorization_code] }
        code: { type: string }
        client_id: { type: string }
        client_secret: { type: string }
    CreateOAuthAppDto:
      type: object
      required: [name, redirectUrl]
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        pictureId: { type: string }
        redirectUrl: { type: string, format: uri }
    UpdateOAuthAppDto:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        pictureId: { type: string }
        redirectUrl: { type: string, format: uri }

    # ---------- Announcements / enterprise ----------
    AnnouncementDto:
      type: object
      required: [title, description]
      properties:
        title: { type: string }
        description: { type: string }
        color: { type: string, enum: [INFO, WARNING, ERROR] }
    SignedParams:
      type: object
      required: [params]
      properties:
        params: { type: string, description: A signed JWT carrying the operation payload. }
