# WARNING: This file is manually maintained and likely out of date.
# The NestJS Swagger decorators (@ApiTags, @ApiOperation, etc.) on the
# controllers auto-generate the spec at build time. Regenerate it from
# decorators rather than editing this file by hand. The stale
# `/media/upload-server` and `/media/save-media` entries have been removed
# (the routes now live under `/files/*`). New `/media/stock/*` routes are
# also absent here.

openapi: 3.1.0

info:
  title: Postmill API (reaatech fork)
  version: 3.4.0
  description: |
    Comprehensive OpenAPI description of the **Postmill** backend (NestJS) as it exists in this
    heavily-modified `reaatech` fork.

    Postmill schedules social-media and chat posts to 28+ channels, with a calendar, analytics, team
    management, a media library, and — in this fork — a pluggable multi-provider **AI layer**,
    **Analytics v2** persisted dashboards, **social comments** sync/moderation, admin-configurable
    **channel OAuth credentials**, and an OAuth2 authorization-code provider.

    ## Surfaces & authentication

    There are three distinct authentication surfaces:

    1. **Dashboard API** (the bulk of routes). Requires a Postmill user session JWT supplied either as
       the `auth` **cookie** or the `auth` **request header**. The active organization is selected
       with the `showorg` cookie/header. Many routes are further gated by RBAC policies
       (`@CheckPolicies`) or by `isSuperAdmin`.
    2. **Public integration API** (`/public/v1/*`). Requires an organization **API key** (or a
       `pos_`-prefixed OAuth access token) in the `Authorization` header. Intended for
       n8n/Zapier/CLI/3rd-party automation.
    3. **Unauthenticated routes** — registration/login, the OAuth2 authorization/token endpoints,
       Stripe & enterprise webhooks, the social-connect OAuth callback, health/monitor, and public
       post previews. These validate their own signed payloads or are intentionally open.

    > **Servers** are illustrative. The backend listens on `PORT` (default `3000`) and applies **no**
    > global route prefix — controller paths are mounted at the root.

    ## Rate limiting
    A global throttler allows `API_LIMIT` (default **600**) requests/hour per client (Redis-backed,
    proxy-aware). Some routes apply tighter per-route throttles (e.g. AI provider connection tests).

  contact:
    name: Postmill (gitroom)
    url: https://postiz.com
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.en.html

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.postiz.example.com
    description: Self-hosted production (example)

tags:
  - name: Auth
    description: Registration, login, password reset, social OAuth login, activation.
  - name: User
    description: Current user, organizations, impersonation, API key rotation, subscription view.
  - name: Posts
    description: Create / schedule / list / delete posts, tags, drafts, AI generator (streaming).
  - name: Social Comments
    description: "Fork addition: synced platform comments, replies, likes, read-state, assignment."
  - name: Integrations
    description: Connect & manage social channels, plugs, mentions, provider tool invocation.
  - name: Media
    description: Media library, uploads (server / R2 multipart), AI image & video generation.
  - name: Analytics V2
    description: "Fork addition: persisted multi-channel analytics dashboard, exports."
  - name: AI Settings
    description: "Fork addition: super-admin AI provider, governance, scope, RAG & media config."
  - name: AI User
    description: "Fork addition: per-org AI utilities — repurpose, translate, variants, usage, brand."
  - name: AI Moderation
    description: "Fork addition: guardrail input/output moderation."
  - name: Channel Config
    description: "Fork addition: super-admin per-provider OAuth client credentials."
  - name: Billing
    description: Stripe subscriptions, trials, discounts, charges, lifetime codes.
  - name: Settings
    description: Team members and shortlink preference.
  - name: Webhooks
    description: "Org webhooks CRUD and test send. Event types: post.published, comment.new, comment.reply, analytics.snapshot_complete."
  - name: Campaigns
    description: "Fork addition: campaign folders grouping posts/assets/analytics/comments."
  - name: Provider Capabilities
    description: "Fork addition: per-provider capability matrix (comments / first-comment / poll / analytics)."
  - name: Autopost
    description: RSS/URL-driven automatic posting rules.
  - name: Signatures
    description: Post signatures.
  - name: Sets
    description: Reusable channel/setting sets.
  - name: Notifications
    description: In-app notifications.
  - name: Third Party
    description: Non-social third-party integrations (media generators, etc.).
  - name: OAuth
    description: OAuth2 authorization-code provider (authorize / approve / token).
  - name: OAuth App
    description: Manage your org's OAuth application (client) credentials.
  - name: Approved Apps
    description: User-granted OAuth app authorizations.
  - name: Announcements
    description: Product announcements (read public; write super-admin).
  - name: Admin
    description: Super-admin error log and stats.
  - name: Copilot
    description: CopilotKit / Mastra chat & agent runtime endpoints.
  - name: Enterprise
    description: Signed server-to-server enterprise/SaaS provisioning webhooks.
  - name: Stripe
    description: Stripe webhook receiver.
  - name: Public
    description: Unauthenticated public endpoints (post preview, tracking, media stream).
  - name: Monitor
    description: Health/queue probes.
  - name: Public API
    description: "API-key authenticated `/public/v1` automation API (n8n/Zapier/CLI)."

security:
  - cookieAuth: []
  - authHeader: []

paths:
  # ===================================================================== ROOT / HEALTH
  /:
    get:
      tags: [Monitor]
      summary: Liveness root
      operationId: getRoot
      security: []
      responses:
        '200':
          description: App is running
          content:
            text/plain:
              schema: { type: string, example: App is running! }

  /monitor/queue/{name}:
    get:
      tags: [Monitor]
      summary: Queue health probe
      operationId: getQueueHealth
      security: []
      parameters:
        - $ref: '#/components/parameters/QueueName'
      responses:
        '200':
          description: Queue health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: success }
                  message: { type: string, example: Queue posts is healthy. }

  # ===================================================================== AUTH
  /auth/can-register:
    get:
      tags: [Auth]
      summary: Whether local registration is open
      operationId: canRegister
      security: []
      responses:
        '200':
          description: Registration flag
          content:
            application/json:
              schema:
                type: object
                properties: { register: { type: boolean } }
              example: { register: true }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user / organization
      operationId: register
      security: []
      description: |
        On success sets the `auth` (and possibly `showorg`) cookie. If email activation is required
        (`LOCAL` provider + an email provider configured) returns `{ activate: true }` and an
        `activate: true` response header instead of a session.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateOrgUserDto' }
      responses:
        '200':
          description: Registered (session cookie set) or activation required
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookie' }
            onboarding: { schema: { type: string }, description: Present (`true`) for a brand-new user }
            activate: { schema: { type: string }, description: Present (`true`) when email activation is required }
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties: { register: { type: boolean, example: true } }
                  - type: object
                    properties: { activate: { type: boolean, example: true } }
        '400':
          description: Registration failed (message in body)
          content:
            text/plain: { schema: { type: string } }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginUserDto' }
      responses:
        '200':
          description: "Logged in; `auth` cookie set, `reload: true` header returned"
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookie' }
            reload: { schema: { type: string }, description: '`true`' }
          content:
            application/json:
              schema:
                type: object
                properties: { login: { type: boolean, example: true } }
        '400':
          description: Invalid credentials (message in body)
          content:
            text/plain: { schema: { type: string } }

  /auth/forgot:
    post:
      tags: [Auth]
      summary: Request a password-reset email
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordDto' }
      responses:
        '200':
          description: Always returns a boolean (does not reveal account existence)
          content:
            application/json:
              schema: { type: object, properties: { forgot: { type: boolean } } }

  /auth/forgot-return:
    post:
      tags: [Auth]
      summary: Complete a password reset
      operationId: forgotReturn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotReturnPasswordDto' }
      responses:
        '200':
          description: Reset result
          content:
            application/json:
              schema: { type: object, properties: { reset: { type: boolean } } }

  /auth/resend-activation:
    post:
      tags: [Auth]
      summary: Resend the activation email
      operationId: resendActivation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResendActivationDto' }
      responses:
        '200':
          description: Result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }

  /auth/activate:
    post:
      tags: [Auth]
      summary: Activate an account with an emailed code
      operationId: activate
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
                datafast_visitor_id: { type: string }
      responses:
        '200':
          description: Activation result; sets `auth` cookie when successful
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookie' }
          content:
            application/json:
              schema: { type: object, properties: { can: { type: boolean } } }

  /auth/oauth/{provider}:
    get:
      tags: [Auth]
      summary: Begin social OAuth login
      operationId: oauthLink
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthProvider'
      responses:
        '200':
          description: Provider-specific authorization URL / payload
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /auth/oauth/{provider}/exists:
    post:
      tags: [Auth]
      summary: Complete social OAuth login (exchange code)
      operationId: oauthExists
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                redirect_uri: { type: string }
      responses:
        '200':
          description: "Returns a one-time token, or sets the session cookie and returns `{ login: true }`"
          headers:
            Set-Cookie: { $ref: '#/components/headers/SetAuthCookie' }
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties: { token: { type: string } }
                  - type: object
                    properties: { login: { type: boolean } }

  /auth/oauth-mobile-callback:
    get:
      tags: [Auth]
      summary: Mobile deep-link OAuth callback
      operationId: oauthMobileCallback
      security: []
      parameters:
        - { name: code, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
      responses:
        '302':
          description: Redirects to the mobile app scheme (`MOBILE_APP_SCHEME`).

  # ===================================================================== USER
  /user/self:
    get:
      tags: [User]
      summary: Current user + active organization context
      operationId: getSelf
      responses:
        '200':
          description: The authenticated user, enriched with org/tier/role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SelfUser' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /user/personal:
    get:
      tags: [User]
      summary: Get personal profile
      operationId: getPersonal
      responses:
        '200': { description: Personal info, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
    post:
      tags: [User]
      summary: Update personal profile
      operationId: changePersonal
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserDetailDto' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /user/impersonate:
    get:
      tags: [User]
      summary: Search users to impersonate (super-admin)
      operationId: getImpersonate
      parameters:
        - { name: name, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: Matching users, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }
        '400': { $ref: '#/components/responses/Unauthorized400' }
    post:
      tags: [User]
      summary: Start impersonating a user (super-admin)
      operationId: setImpersonate
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [id], properties: { id: { type: string } } }
      responses:
        '200': { description: Impersonation cookie set }
        '400': { $ref: '#/components/responses/Unauthorized400' }

  /user/email-notifications:
    get:
      tags: [User]
      summary: Get email notification preferences
      operationId: getEmailNotifications
      responses:
        '200': { description: Preferences, content: { application/json: { schema: { $ref: '#/components/schemas/EmailNotificationsDto' } } } }
    post:
      tags: [User]
      summary: Update email notification preferences
      operationId: updateEmailNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailNotificationsDto' }
      responses:
        '200': { description: Updated }

  /user/api-key/rotate:
    post:
      tags: [User]
      summary: Rotate the organization API key (admin)
      operationId: rotateApiKey
      responses:
        '200':
          description: New API key
          content:
            application/json:
              schema: { type: object, additionalProperties: true }

  /user/subscription:
    get:
      tags: [User]
      summary: Current subscription (admin)
      operationId: getSubscription
      responses:
        '200':
          description: Subscription or undefined
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription: { $ref: '#/components/schemas/Subscription' }

  /user/subscription/tiers:
    get:
      tags: [User]
      summary: Available subscription tiers/packages (admin)
      operationId: getTiers
      responses:
        '200': { description: Packages, content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /user/organizations:
    get:
      tags: [User]
      summary: Organizations the user belongs to
      operationId: getOrgs
      responses:
        '200': { description: Organizations, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Organization' } } } } }

  /user/join-org:
    post:
      tags: [User]
      summary: Join an organization via signed invite cookie
      operationId: joinOrg
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { org: { type: string, description: Signed org-invite token } } }
      responses:
        '200': { description: Joined org id (or null), content: { application/json: { schema: { type: object, properties: { id: { type: [string, 'null'] } } } } } }

  /user/change-org:
    post:
      tags: [User]
      summary: Switch the active organization
      operationId: changeOrg
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [id], properties: { id: { type: string } } }
      responses:
        '200': { description: '`showorg` cookie set' }

  /user/logout:
    post:
      tags: [User]
      summary: Log out (clears auth cookies)
      operationId: logout
      responses:
        '200': { description: Logged out }

  /user/agent-media-sso:
    get:
      tags: [User]
      summary: Get an Agent Media SSO URL
      operationId: agentMediaSso
      responses:
        '200': { description: SSO URL, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } }
        '400': { description: Agent Media SSO not configured }

  /user/t:
    post:
      tags: [User]
      summary: Track an analytics event (authenticated)
      operationId: trackEventUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrackEventBody' }
      responses:
        '200': { description: Tracking id, content: { application/json: { schema: { type: object, properties: { track: { type: string } } } } } }

  # ===================================================================== POSTS
  /posts:
    get:
      tags: [Posts]
      summary: Calendar posts within a date range
      operationId: getPosts
      parameters:
        - { name: startDate, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: endDate, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: customer, in: query, required: false, schema: { type: string } }
      responses:
        '200':
          description: Minified posts for the calendar
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/CalendarPost' } }
    post:
      tags: [Posts]
      summary: Create / schedule / draft a post group
      operationId: createPost
      description: |
        Server-side validates every channel's content & settings. Non-draft posts that fail
        validation return a structured `400` (see `PostValidationError`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePostDto' }
      responses:
        '200':
          description: Created post group
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreatePostResult' }
        '400': { $ref: '#/components/responses/PostValidation' }
        '406': { $ref: '#/components/responses/SubscriptionRequired' }

  /posts/valid:
    post:
      tags: [Posts]
      summary: Validate a post group without saving
      operationId: validatePosts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                posts: { type: array, items: { $ref: '#/components/schemas/Post' } }
      responses:
        '200': { description: Per-channel validation results, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PostValidationItem' } } } } }

  /posts/list:
    get:
      tags: [Posts]
      summary: Paginated post list (table view)
      operationId: getPostsList
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: customer, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string, enum: [all, scheduled, draft, published], default: all } }
      responses:
        '200': { description: Paginated posts (with stats & unread comment counts), content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /posts/old:
    get:
      tags: [Posts]
      summary: Posts older than a date
      operationId: getOldPosts
      parameters: [{ name: date, in: query, required: true, schema: { type: string, format: date-time } }]
      responses:
        '200': { description: Posts, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } }

  /posts/find-slot:
    get:
      tags: [Posts]
      summary: Find the next free scheduling slot
      operationId: findSlot
      responses:
        '200': { description: Next free datetime, content: { application/json: { schema: { type: object, properties: { date: { type: string, format: date-time } } } } } }

  /posts/find-slot/{id}:
    get:
      tags: [Posts]
      summary: Find the next free slot for a channel
      operationId: findSlotIntegration
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses:
        '200': { description: Next free datetime, content: { application/json: { schema: { type: object, properties: { date: { type: string, format: date-time } } } } } }

  /posts/should-shortlink:
    post:
      tags: [Posts]
      summary: Whether content should be short-linked
      operationId: shouldShortlink
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { messages: { type: array, items: { type: string } } } }
      responses:
        '200': { description: Result, content: { application/json: { schema: { type: object, properties: { ask: { type: boolean } } } } } }

  /posts/separate-posts:
    post:
      tags: [Posts]
      summary: Split content into multiple posts by length
      operationId: separatePosts
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, properties: { content: { type: string }, len: { type: integer } } }
      responses:
        '200': { description: Split posts, content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /posts/preflight:
    post:
      tags: [Posts]
      summary: Content QA preflight (warnings + blocking validation, no post created)
      operationId: postsPreflight
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreatePostDto' } } }
      responses:
        '200': { description: Preflight results (warnings and blocking validation), content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /posts/bulk:
    post:
      tags: [Posts]
      summary: Bulk / CSV scheduling (per-row success/warnings/errors)
      operationId: postsBulk
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, additionalProperties: true } } }
      responses:
        '200': { description: Per-row results, content: { application/json: { schema: { type: object, additionalProperties: true } } } }

  /posts/tags:
    get:
      tags: [Posts]
      summary: List tags
      operationId: getTags
      responses:
        '200': { description: Tags, content: { application/json: { schema: { type: object, properties: { tags: { type: array, items: { $ref: '#/components/schemas/Tag' } } } } } } }
    post:
      tags: [Posts]
      summary: Create a tag
      operationId: createTag
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateTagDto' } } }
      responses:
        '200': { description: Created tag, content: { application/json: { schema: { $ref: '#/components/schemas/Tag' } } } }

  /posts/tags/{id}:
    put:
      tags: [Posts]
      summary: Edit a tag
      operationId: editTag
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateTagDto' } } }
      responses: { '200': { description: Updated tag } }
    delete:
      tags: [Posts]
      summary: Delete a tag
      operationId: deleteTag
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Deleted } }

  /posts/generator/draft:
    post:
      tags: [Posts]
      summary: Persist AI-generated posts as drafts
      operationId: generatePostsDraft
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateGeneratedPostsDto' } } }
      responses: { '200': { description: Created drafts } }

  /posts/generator:
    post:
      tags: [Posts]
      summary: Stream an AI-generated post plan (NDJSON)
      operationId: generatePosts
      description: Streams newline-delimited JSON events from the LangGraph agent.
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GeneratorDto' } } }
      responses:
        '200':
          description: NDJSON stream of agent events
          content:
            application/json:
              schema: { type: string, description: One JSON object per line }

  /posts/group/{group}:
    get:
      tags: [Posts]
      summary: Get all posts in a group
      operationId: getPostsByGroup
      parameters: [{ $ref: '#/components/parameters/PathGroup' }]
      responses: { '200': { description: Posts in group, content: { application/json: { schema: { type: array, items: { type: object, additionalProperties: true } } } } } }

  /posts/group/{group}/debug-export:
    get:
      tags: [Posts]
      summary: Debug export of a post group (super-admin)
