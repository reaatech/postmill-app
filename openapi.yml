  # ===================================================================== MEDIA
  /media:
    get:
      tags: [Media]
      summary: List media library
      operationId: getMedia
      parameters:
        - { name: page, in: query, required: true, schema: { type: integer } }
        - { name: search, in: query, schema: { type: string } }
      responses: { '200': { description: Media items, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }

  /media/{id}:
    delete:
      tags: [Media]
      summary: Delete a media item
      operationId: deleteMedia
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      responses: { '200': { description: Deleted } }

  /media/upload-simple:
    post:
      tags: [Media]
      summary: Upload a file; optionally don't persist
      operationId: uploadSimple
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                preventSave: { type: string, enum: ['true', 'false'], default: 'false' }
      responses: { '200': { description: 'Saved media or `{ path }`', content: { application/json: { schema: { type: object, additionalProperties: true } } } } }

  /media/{endpoint}:
    post:
      tags: [Media]
      summary: R2 multipart upload proxy
      operationId: uploadFileR2
      description: |
        Proxies Cloudflare R2 multipart-upload sub-operations (e.g. `create-multipart-upload`,
        `complete-multipart-upload`). On completion, also saves the file to the library.
      parameters: [{ name: endpoint, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: R2 response (and `saved` on completion) } }

  /media/information:
    post:
      tags: [Media]
      summary: Save media alt text / thumbnail metadata
      operationId: saveMediaInformation
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SaveMediaInformationDto' } } }
      responses: { '200': { description: Saved } }

  /media/generate-image:
    post:
      tags: [Media]
      summary: Generate an AI image (base64)
      operationId: generateImage
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { prompt: { type: string } } } } }
      responses:
        '200':
          description: Base64 PNG data URI (or false if out of credits)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties: { output: { type: string, example: 'data:image/png;base64,iVBORw0KG...' } }
                  - type: boolean

  /media/generate-image-with-prompt:
    post:
      tags: [Media]
      summary: Generate an AI image and save it to the library
      operationId: generateImageFromText
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { prompt: { type: string } } } } }
      responses: { '200': { description: Saved media (or false), content: { application/json: { schema: { type: object, additionalProperties: true } } } } }

  /media/remove-background:
    post:
      tags: [Media]
      summary: Remove an image background (AI, credit-checked)
      operationId: removeBackground
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [imageUrl], properties: { imageUrl: { type: string, format: uri } } } } }
      responses: { '200': { description: Resulting image URL, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } } }

  /media/inpaint:
    post:
      tags: [Media]
      summary: Inpaint / magic-edit an image (AI, credit-checked)
      operationId: inpaintImage
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [imageUrl, maskUrl, prompt], properties: { imageUrl: { type: string, format: uri }, maskUrl: { type: string, format: uri }, prompt: { type: string } } } } }
      responses: { '200': { description: Resulting image URL, content: { application/json: { schema: { type: object, properties: { url: { type: string } } } } } } }

  /media/upscale:
    post:
      tags: [Media]
      summary: Upscale an image (AI, credit-checked)
      operationId: upscaleImage
