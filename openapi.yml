    put:
      tags: [Campaigns]
      summary: Update a campaign
      operationId: updateCampaign
      parameters: [{ $ref: '#/components/parameters/PathId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                color: { type: string }
                description: { type: string }
                startDate: { type: string, format: date-time }
